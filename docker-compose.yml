services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: brill_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - composer_cache:/tmp/composer-cache
    environment:
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    depends_on:
      - mariadb
    networks:
      - brill

  nginx:
    image: nginx:1.27-alpine
    container_name: brill_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - brill

  mariadb:
    image: mariadb:11.4
    container_name: brill_mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: brill_lash_and_beauty
      MARIADB_USER: brill
      MARIADB_PASSWORD: ${DB_PASSWORD:-change_this_password}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_this_root_password}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - brill

  node:
    image: node:24-alpine
    profiles:
      - assets
    container_name: brill_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    command: sh -c "npm install && tail -f /dev/null"
    ports:
      - "5173:5173"
    networks:
      - brill

networks:
  brill:
    driver: bridge

volumes:
  mariadb_data:
  composer_cache:
  node_modules:
